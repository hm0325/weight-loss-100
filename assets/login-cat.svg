<svg width="360" height="220" viewBox="0 0 360 220" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .paw-wave {
      transform-box: fill-box;
      transform-origin: 74% 34%;
      animation: wave 1.28s ease-in-out infinite;
    }
    .tail {
      transform-box: fill-box;
      transform-origin: 18% 78%;
      animation: tail 2.4s ease-in-out infinite;
    }
    .blink {
      animation: blink 4.2s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }
    @keyframes wave {
      0%, 100% { transform: rotate(-6deg) translateY(0); }
      50% { transform: rotate(18deg) translateY(-7px); }
    }
    @keyframes tail {
      0%, 100% { transform: rotate(-3deg); }
      50% { transform: rotate(7deg); }
    }
    @keyframes blink {
      0%, 92%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.12); }
    }
  </style>
  <defs>
    <linearGradient id="fur" x1="94" y1="25" x2="251" y2="204" gradientUnits="userSpaceOnUse">

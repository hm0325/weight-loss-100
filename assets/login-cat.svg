    <linearGradient id="belly" x1="156" y1="108" x2="205" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF9EC"/>
      <stop offset="1" stop-color="#FFE0BF"/>
    </linearGradient>
    <filter id="softShadow" x="45" y="16" width="270" height="218" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
